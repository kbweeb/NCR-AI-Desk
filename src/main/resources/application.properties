spring.application.name=ncr-tech-solutions-desk-frontend
server.port=8080

# Document uploads (must match Rust/Python 10 MB cap)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Rust AI desk API (knowledge base + Qwen/Ollama orchestration)
ai.desk.backend-url=http://127.0.0.1:8090

# Chat history database (file under .data/)
spring.datasource.url=jdbc:h2:file:./.data/ncr-desk;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
